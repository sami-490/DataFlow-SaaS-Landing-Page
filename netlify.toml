[build]
command = "npm install && npm run build"
publish = "dist"

[dev]
command = "npm run dev"
port = 3000

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
NODE_VERSION = "18"
NPM_FLAGS = "--legacy-peer-deps"

[context.deploy-preview.environment]
NODE_VERSION = "18"
